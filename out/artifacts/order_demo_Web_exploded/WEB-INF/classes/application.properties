# 数据库驱动，MySQL8.0+必须用cj的驱动
jdbc.driver=com.mysql.cj.jdbc.Driver
# 数据库连接地址，改成你自己的数据库名（你的名字拼音），时区必须加
jdbc.url=jdbc:mysql://localhost:3306/你的名字拼音全拼?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
# 你的MySQL用户名，默认是root
jdbc.username=root
# 你刚才重置的MySQL密码
jdbc.password=12345678zh
# 连接池配置
jdbc.initialSize=5
jdbc.maxActive=20